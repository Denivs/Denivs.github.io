<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denis | Soluciones Tecnológicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Hablemos de tu proyecto</h1>
            <p>Déjame tus datos y me pondré en contacto contigo para empezar a trabajar.</p>
        </header>

        <form class="contact-form" action="#" method="POST">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="input-group">
                <label for="phone">Número de Teléfono</label>
                <input type="tel" id="phone" name="phone" placeholder="+502 0000 0000" required>
            </div>

            <div class="input-group">
                <label for="message">¿Qué necesitas?</label>
                <textarea id="message" name="message" rows="4" placeholder="Cuéntame brevemente sobre tu idea o problema..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Información</button>
        </form>
    </div>

</body>
</html>
